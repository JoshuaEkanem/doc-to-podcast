<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocCast — Document to Podcast</title>
    <style>

        .progress-track {
    width: 100%;
    height: 4px;
    background: #1a1a1a;
    border-radius: 2px;
    margin: 0.8rem 0;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ff41;
    border-radius: 2px;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
}

.progress-label {
    font-size: 0.85rem;
    color: #00cc33;
    letter-spacing: 0.04em;
    margin-bottom: 0.2rem;
}

.progress-steps {
    display: flex;
    gap: 0.8rem;
    margin-top: 0.4rem;
}

.step {
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    color: #1a3a1a;
    transition: color 0.3s;
}

.step.active { color: #00ff41; }
.step.done { color: #007a1f; }

        .btn-download {
    display: block;
    width: 100%;
    padding: 0.75rem;
    margin-top: 0.8rem;
    background: transparent;
    color: #00ff41;
    border: 1px solid #00ff4166;
    border-radius: 4px;
    font-size: 0.88rem;
    font-weight: 700;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: all 0.2s;
}

.btn-download:hover {
    border-color: #00ff41;
    background: #00ff4111;
    box-shadow: 0 0 12px rgba(0, 255, 65, 0.15);
}
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff41;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            background: #0d0d0d;
            border: 1px solid #00ff41;
            border-radius: 4px;
            padding: 2.5rem;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 0 24px rgba(0, 255, 65, 0.08);
        }

        .header {
            border-bottom: 1px solid #00ff4133;
            padding-bottom: 1.2rem;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00ff41;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.82rem;
            color: #007a1f;
            margin-top: 0.3rem;
            letter-spacing: 0.05em;
        }

        .upload-area {
            border: 1px dashed #00ff4166;
            border-radius: 4px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
            background: #0a120a;
        }

        .upload-area:hover {
            border-color: #00ff41;
            background: #0d1a0d;
            box-shadow: 0 0 12px rgba(0, 255, 65, 0.1);
        }

        .upload-area input[type="file"] { display: none; }

        .upload-icon {
            font-size: 2rem;
            margin-bottom: 0.6rem;
        }

        .upload-text {
            font-size: 0.85rem;
            color: #00cc33;
            letter-spacing: 0.04em;
        }

        .file-name {
            margin-top: 0.6rem;
            font-size: 0.82rem;
            color: #00ff41;
            opacity: 0.7;
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            background: transparent;
            color: #00ff41;
            border: 1px solid #00ff41;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #00ff4111;
            box-shadow: 0 0 16px rgba(0, 255, 65, 0.2);
        }

        .btn:disabled {
            border-color: #1a3a1a;
            color: #1a3a1a;
            cursor: not-allowed;
            box-shadow: none;
            background: transparent;
        }

        .status {
            margin-top: 1.5rem;
            padding: 0.9rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            display: none;
        }

        .status.loading {
            background: #0a120a;
            border: 1px solid #00ff4144;
            color: #00cc33;
            display: block;
        }

        .status.error {
            background: #120a0a;
            border: 1px solid #ff003344;
            color: #ff4444;
            display: block;
        }

        .result {
            margin-top: 1.5rem;
            display: none;
        }

        .result.visible { display: block; }

        .section-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #007a1f;
            margin-bottom: 0.5rem;
        }

        .script-box {
            background: #080808;
            border: 1px solid #00ff4133;
            border-radius: 4px;
            padding: 1.2rem;
            font-size: 0.84rem;
            line-height: 1.8;
            color: #00cc33;
            max-height: 260px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
        }

        .script-box::-webkit-scrollbar { width: 4px; }
        .script-box::-webkit-scrollbar-track { background: #0a0a0a; }
        .script-box::-webkit-scrollbar-thumb { background: #00ff4144; border-radius: 2px; }

        audio {
            width: 100%;
            margin-top: 0.4rem;
            border-radius: 4px;
            filter: hue-rotate(90deg) saturate(1.5);
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #007a1f;
            letter-spacing: 0.06em;
        }

        .voice-row {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.2rem;
}

.voice-group {
    flex: 1;
}

.voice-select {
    width: 100%;
    padding: 0.6rem 0.8rem;
    background: #080808;
    color: #00ff41;
    border: 1px solid #00ff4144;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 0.82rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
}

.voice-select:hover,
.voice-select:focus {
    border-color: #00ff41;
}

.voice-select option,
.voice-select optgroup {
    background: #0d0d0d;
    color: #00cc33;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙 DocCast</h1>
            <p class="subtitle">// upload a document. get a podcast. fully offline.</p>
        </div>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📄</div>
            <div class="upload-text">[ click to upload PDF, DOCX, or TXT ]</div>
            <div class="file-name" id="fileName">_ no file selected</div>
            <input type="file" id="fileInput" accept=".pdf,.docx,.txt" onchange="handleFileSelect(this)">
        </div>

        <div class="voice-row">
    <div class="voice-group">
        <div class="section-label">// host a voice</div>
        <select class="voice-select" id="voiceA">
            <optgroup label="American Female">
                <option value="af_heart" selected>af_heart</option>
                <option value="af_alloy">af_alloy</option>
                <option value="af_aoede">af_aoede</option>
                <option value="af_bella">af_bella</option>
                <option value="af_jessica">af_jessica</option>
                <option value="af_kore">af_kore</option>
                <option value="af_nicole">af_nicole</option>
                <option value="af_nova">af_nova</option>
                <option value="af_river">af_river</option>
                <option value="af_sarah">af_sarah</option>
                <option value="af_sky">af_sky</option>
            </optgroup>
            <optgroup label="American Male">
                <option value="am_adam">am_adam</option>
                <option value="am_echo">am_echo</option>
                <option value="am_eric">am_eric</option>
                <option value="am_fenrir">am_fenrir</option>
                <option value="am_liam">am_liam</option>
                <option value="am_michael">am_michael</option>
                <option value="am_onyx">am_onyx</option>
                <option value="am_puck">am_puck</option>
            </optgroup>
            <optgroup label="British Female">
                <option value="bf_alice">bf_alice</option>
                <option value="bf_emma">bf_emma</option>
                <option value="bf_isabella">bf_isabella</option>
                <option value="bf_lily">bf_lily</option>
            </optgroup>
            <optgroup label="British Male">
                <option value="bm_daniel">bm_daniel</option>
                <option value="bm_fable">bm_fable</option>
                <option value="bm_george">bm_george</option>
                <option value="bm_lewis">bm_lewis</option>
            </optgroup>
        </select>
    </div>
    <div class="voice-group">
        <div class="section-label">// host b voice</div>
        <select class="voice-select" id="voiceB">
            <optgroup label="American Male">
                <option value="am_michael" selected>am_michael</option>
                <option value="am_adam">am_adam</option>
                <option value="am_echo">am_echo</option>
                <option value="am_eric">am_eric</option>
                <option value="am_fenrir">am_fenrir</option>
                <option value="am_liam">am_liam</option>
                <option value="am_onyx">am_onyx</option>
                <option value="am_puck">am_puck</option>
            </optgroup>
            <optgroup label="American Female">
                <option value="af_heart">af_heart</option>
                <option value="af_alloy">af_alloy</option>
                <option value="af_aoede">af_aoede</option>
                <option value="af_bella">af_bella</option>
                <option value="af_jessica">af_jessica</option>
                <option value="af_kore">af_kore</option>
                <option value="af_nicole">af_nicole</option>
                <option value="af_nova">af_nova</option>
                <option value="af_river">af_river</option>
                <option value="af_sarah">af_sarah</option>
                <option value="af_sky">af_sky</option>
            </optgroup>
            <optgroup label="British Male">
                <option value="bm_daniel">bm_daniel</option>
                <option value="bm_fable">bm_fable</option>
                <option value="bm_george">bm_george</option>
                <option value="bm_lewis">bm_lewis</option>
            </optgroup>
            <optgroup label="British Female">
                <option value="bf_alice">bf_alice</option>
                <option value="bf_emma">bf_emma</option>
                <option value="bf_isabella">bf_isabella</option>
                <option value="bf_lily">bf_lily</option>
            </optgroup>
        </select>
    </div>
</div>

<button class="btn" id="generateBtn" onclick="generate()" disabled>
    &gt;&gt; Generate Podcast
</button>

        <div class="status" id="status" style="display:none">
    <div class="progress-label" id="progressLabel">> initializing...</div>
    <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-steps">
        <span class="step" id="step-extract">[ extract ]</span>
        <span class="step" id="step-script">[ script ]</span>
        <span class="step" id="step-audio">[ audio ]</span>
    </div>
</div>

        <div class="result" id="result">
            <div class="section-label">// generated script</div>
            <div class="script-box" id="scriptBox"></div>

            <div class="section-label">// audio output</div>
<audio id="audioPlayer" controls></audio>
<a class="btn-download" id="downloadBtn" href="#" download="podcast.wav" style="display:none">
    &gt;&gt; Download Audio
</a>
        </div>
    </div>

    <div class="footer">powered by Afang Soup</div>

    <script>
        let selectedFile = null;

        function handleFileSelect(input) {
            selectedFile = input.files[0];
            document.getElementById('fileName').textContent = '_ ' + selectedFile.name;
            document.getElementById('generateBtn').disabled = false;
        }

        async function generate() {
    if (!selectedFile) return;

    const btn = document.getElementById('generateBtn');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');

    btn.disabled = true;
    result.classList.remove('visible');
    status.style.display = 'block';
    progressBar.style.width = '0%';

    const steps = {
        'extract': document.getElementById('step-extract'),
        'script': document.getElementById('step-script'),
        'audio': document.getElementById('step-audio'),
    };

    Object.values(steps).forEach(s => s.className = 'step');

    const formData = new FormData();
    formData.append('document', selectedFile);
    formData.append('voice_a', document.getElementById('voiceA').value);
    formData.append('voice_b', document.getElementById('voiceB').value);

    try {
        const response = await fetch('/generate', {
            method: 'POST',
            body: formData
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data:')) continue;
                const json = line.replace('data: ', '').trim();

                try {
                    const data = JSON.parse(json);

                    if (data.error) {
                        progressLabel.textContent = '! ' + data.error;
                        progressLabel.style.color = '#ff4444';
                        btn.disabled = false;
                        return;
                    }

                    if (data.done) {
                        progressBar.style.width = '100%';
                        progressLabel.textContent = '> podcast ready.';
                        Object.values(steps).forEach(s => s.className = 'step done');

                        setTimeout(() => { status.style.display = 'none'; }, 800);

                        document.getElementById('scriptBox').textContent = data.result.script;
                        const audioUrl = data.result.audio_url + '?t=' + Date.now();
                        document.getElementById('audioPlayer').src = audioUrl;
                        const downloadBtn = document.getElementById('downloadBtn');
                        downloadBtn.href = audioUrl;
                        downloadBtn.style.display = 'block';
                        result.classList.add('visible');

                    } else {
                        progressLabel.textContent = '> ' + data.message;
                        progressBar.style.width = data.percent + '%';

                        if (steps[data.step]) {
                            steps[data.step].className = 'step active';
                            if (data.percent >= 30 && data.step === 'extract')
                                steps['extract'].className = 'step done';
                            if (data.percent >= 65 && data.step === 'script')
                                steps['script'].className = 'step done';
                        }
                    }
                } catch (e) { continue; }
            }
        }

    } catch (err) {
        progressLabel.textContent = '! error: ' + err.message;
        progressLabel.style.color = '#ff4444';
    }

    btn.disabled = false;
}
    </script>
</body>
</html>
